name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Lean
        uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9
        with:
          auto-config: false
      - name: Download Mathlib cache
        run: lake exe cache get
      - name: Build project
        run: lake build
      - name: Run declaration linter
        run: lake exe runLinter GKPCarry
      - name: Run style linter
        run: lake exe lint-style GKPCarry
      - name: Audit proof surface
        run: bash scripts/audit.sh
